<div class="site-wrapper">
  <div
    data-animation="over-left"
    class="navbar-main w-nav"
    data-easing2="ease"
    data-easing="ease-out-quart"
    data-collapse="medium"
    role="banner"
    data-duration="1000"
    id="navbar"
  >
    <div class="navbar">
     <a 
      [routerLink]="['/']" 
      class="site-logo-wrapper w-inline-block" 
      style="cursor: pointer;"
    >
      <img
        src="assets/white-color-logo.png" 
        alt="phian logo"
        class="site-logo"
        style="display: block; width: 120px; height: 90px;"
      />
    </a>

      <nav role="navigation" class="nav-menu-wrapper w-nav-menu">
        <div class="nav-menu">
          <a routerLink="/" fragment="hero" class="nav-link-wrapper w-inline-block">
            <div class="nav-link">
              <div class="default-text">Home</div>
              <div class="default-text black-heading">Home</div>
            </div>
            <div class="absolute-hover-bottom"></div>
          </a>

          <a routerLink="/" fragment="about" class="nav-link-wrapper w-inline-block">
            <div class="nav-link">
              <div class="default-text">About</div>
              <div class="default-text black-heading">About</div>
            </div>
            <div class="absolute-hover-bottom"></div>
          </a>

          <a routerLink="/" fragment="services" class="nav-link-wrapper w-inline-block">
            <div class="nav-link">
              <div class="default-text">Services</div>
              <div class="default-text black-heading">Services</div>
            </div>
            <div class="absolute-hover-bottom"></div>
          </a>

          <a routerLink="/" fragment="team" class="nav-link-wrapper w-inline-block">
            <div class="nav-link">
              <div class="default-text">Team</div>
              <div class="default-text black-heading">Team</div>
            </div>
            <div class="absolute-hover-bottom"></div>
          </a>

          <a routerLink="/" fragment="works" class="nav-link-wrapper w-inline-block">
            <div class="nav-link">
              <div class="default-text">Works</div>
              <div class="default-text black-heading">Works</div>
            </div>
            <div class="absolute-hover-bottom"></div>
          </a>

          <a routerLink="/" fragment="careers" class="nav-link-wrapper w-inline-block">
            <div class="nav-link">
              <div class="default-text">Careers</div>
              <div class="default-text black-heading">Careers</div>
            </div>
            <div class="absolute-hover-bottom"></div>
          </a>

          <a routerLink="/" fragment="client" class="nav-link-wrapper w-inline-block">
            <div class="nav-link">
              <div class="default-text">Client</div>
              <div class="default-text black-heading">Client</div>
            </div>
            <div class="absolute-hover-bottom"></div>
          </a>

          <a routerLink="/" fragment="contact" class="primary-button w-inline-block">
            <div class="button-text-wrapper-26px">
              <div class="default-text">Contact Us</div>
              <div class="default-text">Contact Us</div>
            </div>
            <div class="hover-color"></div>
            <div class="circle-position"><div class="_15px-circle"></div></div>
            <div class="circle-position"><div class="_15px-circle"></div></div>
          </a>
        </div>

        <div class="close-navbar-icon w-nav-button">
          <div class="close-icon-rotate-white">close</div>
        </div>
      </nav>

      <div class="hamburger-menu w-nav-button">
        <div class="bars">
          <div class="bar-wrapper">
            <div class="hamburger-line _1"></div>
            <div class="_5px-hover-style _1"></div>
          </div>
          <div class="bar-wrapper">
            <div class="hamburger-line _2"></div>
            <div class="_5px-hover-style _2"></div>
          </div>
          <div class="bar-wrapper">
            <div class="hamburger-line _3"></div>
            <div class="_5px-hover-style _3"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
