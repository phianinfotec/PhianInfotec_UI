<!-- BLOG HERO -->
<header id="hero" class="hero-section w-background-video w-background-video-atom">
  <video id="hero-video-element" autoplay muted loop playsinline preload="auto" [muted]="true">
    <source
      src="https://cdn.prod.website-files.com/67bad91522bc0ef5852a9133%2F681795b5c8bbadc55475a4d4_2324166-hd_1920_1080_25fps-transcode.mp4"
      type="video/mp4"
    />
  </video>

  <div class="container hero" style="opacity: 1; position: relative; z-index: 3">
    <div class="hero-block">
      <div class="hero-top-content">
        <div class="sub-title">
          <div class="_8px-circle"></div>
          <div class="gradient-bg">Our Blogs</div>
        </div>
        <h2 class="hero-sub-heading">Explore Digital Marketing Insights & Growth Strategies</h2>
        <div>
          <a [routerLink]="['/']" class="primary-button w-inline-block">
            <div class="button-text-wrapper-26px">
              <div class="default-text">View Home</div>
              <!-- <div class="default-text">View Services</div> -->
            </div>
            <div class="hover-color"></div>
            <div class="circle-position"><div class="_15px-circle"></div></div>
            <div class="circle-position"><div class="_15px-circle"></div></div>
          </a>
        </div>
      </div>

      <div class="hero-title-block">
        <h1 class="hero-heading-17cqw">Marketing  <span class="stroked">Blogs</span></h1>
      </div>

      <div class="circle-hero"></div>
      <div class="circle-left-top"></div>
      <div class="circle-small-3"></div>
      <div class="circle-small-2"></div>
      <div class="circle-small"></div>

      <img
        src="https://cdn.prod.website-files.com/67bad91522bc0ef5852a9133/67baea8c84b37ae060a08c23_star%20(1).avif"
        loading="lazy"
        alt="star decorative"
        class="_60px-star-loop"
      />
    </div>
  </div>

  <div class="hero-section-overlay"></div>
</header>



<!-- BLOG LIST SECTION -->

<section class="blog-section-dark">

  <div class="container">

    <div class="section-title-center">

      <div class="sub-title">
        <div class="_8px-circle"></div>
        Our Blogs
      </div>

      <h2 class="view-all-title">
        DIGITAL MARKETING <span>INSIGHTS</span>
      </h2>

    </div>


    <div class="blog-grid-dark">

      <div class="blog-card-dark"
           *ngFor="let blog of blogs"
           (click)="openBlog(blog.id)">

       <div class="blog-img-dark">
  <img [src]="blog.image" style="width:100%; height:250px; object-fit:cover;">
</div>

        <div class="blog-content-dark">

          <div class="blog-meta-dark">
            <span class="blog-category-dark">{{blog.category}}</span>
            <span class="blog-date-dark">{{blog.date}}</span>
          </div>

          <h3>{{blog.title}}</h3>

          <p class="blog-excerpt-dark">
            {{blog.excerpt}}
          </p>

        </div>

      </div>

    </div>

  </div>

</section>
