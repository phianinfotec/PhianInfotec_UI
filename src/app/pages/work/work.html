<section class="brand-raids">

  <div class="container">

    <!-- HEADER -->

   <header id="work-hero" class="hero-section">
  <video id="hero-video-element" autoplay muted loop playsinline preload="auto">
    <source src="https://cdn.prod.website-files.com/67bad91522bc0ef5852a9133%2F681795b5c8bbadc55475a4d4_2324166-hd_1920_1080_25fps-transcode.mp4" type="video/mp4" />
  </video>

  <div class="container hero" style="position: relative; z-index: 3;">
    <div class="hero-block">
      
      <div class="hero-top-content">
        <div class="sub-title">
          <div class="_8px-circle"></div>
          <div class="gradient-bg">Our Work</div>
        </div>
        <h2 class="hero-sub-heading">
          Crafting powerful campaigns, immersive sites, and engaging reels.
        </h2>
      </div>

      <div class="hero-title-block">
        <h1 class="hero-heading-17cqw">
          Brand <span class="stroked" style="-webkit-text-stroke: 1px #fff; color: transparent; font-family: inherit;">Raids</span>
        </h1>
        <p class="hero-desc-text">
          Helping brands grow faster through creative excellence and strategic digital marketing co-founded by industry visionaries.
        </p>
      </div>

      <div class="circle-hero"></div>
      <div class="circle-left-top"></div>
      <div class="circle-small-3"></div>
      
      <img
        src="https://cdn.prod.website-files.com/67bad91522bc0ef5852a9133/67baea8c84b37ae060a08c23_star%20(1).avif"
        loading="lazy"
        alt="star"
        class="_60px-star-loop"
        style="top: 20%; right: 10%; width: 60px;"
      />
    </div>
  </div>

  <div class="hero-social-block" style="position: absolute; bottom: 40px; left: 5%; display: flex; align-items: center; gap: 15px; z-index: 4;">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 25 25" fill="#FFCC00">
        <path d="M12.5 0.25L15.7411 9.00891L24.5 12.25L15.7411 15.4911L12.5 24.25L9.25891 15.4911L0.5 12.25L9.25891 9.00891L12.5 0.25Z" fill="currentColor" />
    </svg>
    <p style="margin: 0; text-transform: uppercase; letter-spacing: 2px; font-size: 12px; color: #fff;">Case Studies</p>
  </div>

  <div class="hero-section-overlay" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2;"></div>
</header>



    <!-- FILTER -->

    <div class="filters">

      <span
      [class.active]="activeFilter==='all'"
      (click)="setFilter('all')">ALL</span>

      <span
      [class.active]="activeFilter==='reels'"
      (click)="setFilter('reels')">REELS</span>

      <span
      [class.active]="activeFilter==='web'"
      (click)="setFilter('web')">WEBSITES</span>

      <span
      [class.active]="activeFilter==='campaign'"
      (click)="setFilter('campaign')">CAMPAIGNS</span>

    </div>

    <!-- GRID -->

    <div class="grid">

      <div
      class="card ultra-card"
      *ngFor="let item of filteredItems; let i=index"
      [style.animationDelay]="i * 80 + 'ms'">

        <!-- WEBSITE -->
        <a *ngIf="item.link" [href]="item.link" target="_blank">
          <img *ngIf="item.image" [src]="item.image">
        </a>

        <!-- IMAGE -->
        <img *ngIf="!item.link && item.image" [src]="item.image">

        <!-- REEL -->
        <video
        *ngIf="item.video"
        [src]="item.video"
        muted
        loop
        playsinline
        autoplay
        class="reel-video">
        </video>

        <h4>{{item.title}}</h4>

      </div>

    </div>

  </div>

</section>
